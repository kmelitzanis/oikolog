services:
  app:
    image: kostasmel/oikolog-app:latest
    pull_policy: always
    container_name: oikolog-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-oikolog}
      - DB_USERNAME=${DB_USERNAME:-oikolog}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - FORCE_MIGRATE=${FORCE_MIGRATE:-1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    networks:
      - oikolog

  webserver:
    image: nginx:1.25-alpine
    container_name: oikolog-web
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - app-storage:/var/www/html/storage:ro
      - app-cache:/var/www/html/bootstrap/cache:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - oikolog

  db:
    image: mysql:8.1
    container_name: oikolog-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_DATABASE:-oikolog}
      - MYSQL_USER=${DB_USERNAME:-oikolog}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - oikolog

volumes:
  dbdata:
  app-storage:
  app-cache:

networks:
  oikolog:
    driver: bridge
